name: Data Refresh

on:
  workflow_dispatch:
  schedule:
    # Runs monthly on the 21st at 06:00 UTC.
    - cron: '0 6 21 * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: unlocode-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Refresh UN/LOCODE data
        run: pnpm data:refresh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore(data): refresh UN/LOCODE data'
          title: 'chore(data): refresh UN/LOCODE data'
          body: |
            Automated monthly UN/LOCODE data refresh.

            - Download latest UNECE CSV files into `src/data/raw`
            - Convert raw CSV files into `src/data/data.json`
          branch: codex/unlocode-data-refresh
          delete-branch: true
