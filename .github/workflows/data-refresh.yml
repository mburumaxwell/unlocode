name: Data Refresh

on:
  workflow_dispatch:
  schedule:
    # Runs monthly on the 21st at 06:00 UTC.
    - cron: '0 6 21 * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: unlocode-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Refresh UN/LOCODE data
        run: pnpm data:refresh

      - name: Current date
        id: current-date
        uses: mburumaxwell/actions/current-date@main

      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID_RELEASER }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY_RELEASER }}
          permission-contents: write
          permission-pull-requests: write

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.generate-token.outputs.token }}
          base: main
          commit-message: 'Update data source as of ${{ steps.current-date.outputs.date }}'
          title: 'Update data source as of ${{ steps.current-date.outputs.date }}'
          branch: unlocode-data-refresh
          signoff: true
          body: |
            Automated monthly UN/LOCODE data refresh.

            - Download latest UNECE CSV files into `src/data/raw`
            - Convert raw CSV files into `src/data/data.json`
          delete-branch: true
          sign-commits: true
